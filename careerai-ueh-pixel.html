<html lang="vi">
<head>

  <title>Trang chủ - CareerAI UEH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
  <section class="screen hero-screen" id="home">
    <header class="topbar">
      <div class="container nav-wrap">

          <div class="ueh-logo"><span class="stick"></span><span>UEH</span></div>
          <div class="brand-meta">
            <div class="uni">TRƯỜNG ĐẠI HỌC KINH TẾ TP.HCM</div>
            <div class="ai">CareerAI</div>
          </div>
        </div>
        <nav class="nav">

  <script src="careerai.js" defer></script>

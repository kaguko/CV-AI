<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luồng - CareerAI UEH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="careerai-ueh-pixel.css" />
</head>
<body>
  <section class="screen" id="jobs">
    <header class="topbar">
      <div class="container nav-wrap">
        <div class="brand"><div class="ueh-logo"><span class="stick"></span><span>UEH</span></div><div class="brand-meta"><div class="uni">TRƯỜNG ĐẠI HỌC KINH TẾ TP.HCM</div><div class="ai">CareerAI</div></div></div>
        <nav class="nav"><a href="careerai-ueh-pixel.html">Trang chủ</a><a href="about.html">Giới thiệu</a><a class="active" href="jobs.html">Luồng</a><a href="contact.html">Hỗ trợ</a></nav>
      </div>
    </header>
    <div class="container">
      <h2 class="job-title">Chọn nghề nghiệp mong muốn</h2>
      <p class="section-sub">Hãy chọn lĩnh vực và vị trí bạn muốn ứng tuyển</p>
      <div class="searchbox">🔍 <input id="job-search" type="text" placeholder="Tìm kiếm nghề nghiệp..." aria-label="Tìm kiếm nghề nghiệp" /></div>
      <div class="job-cards">
        <div class="job-box" data-job-key="marketing"><div class="emoji">📊</div>Marketing</div>
        <div class="job-box" data-job-key="finance"><div class="emoji">💰</div>Tài chính</div>
        <div class="job-box" data-job-key="technology"><div class="emoji">💻</div>Công nghệ</div>
        <div class="job-box" data-job-key="humanresources"><div class="emoji">👥</div>Nhân sự</div>
        <div class="job-box" data-job-key="accounting"><div class="emoji">📋</div>Kế toán</div>
        <div class="job-box" data-job-key="logistics"><div class="emoji">🚚</div>Logistics</div>
      </div>
      <div class="center-btn"><a class="next-btn" id="jobs-continue" href="upload.html">Tiếp tục →</a></div>
    </div>
  </section>
  <script src="careerai.js" defer></script>
</body>
</html>
